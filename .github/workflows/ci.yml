name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          grep -vE "^\s*#|torch|spacy|en_core_web|llama.cpp|llama-cpp|selenium|fastembed|qdrant|catboost|jupyterlab|notebook|ipywidgets|transformers|tokenizers" requirements.txt > /tmp/requirements-ci.txt
          pip install --no-cache-dir -r /tmp/requirements-ci.txt

      - name: Run tests
        env:
          DEV_MODE: "true"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short -x
